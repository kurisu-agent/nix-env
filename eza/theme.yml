# Catppuccin Mocha theme for eza
# Originally: https://github.com/catppuccin/eza
#
# *Template*: `@pal_NAME@` placeholders are substituted at build time
# from lib/palette.nix via lib/default.nix#substitutePalette. Edit by
# referencing palette names — never inline literal hex.

colourful: true

filekinds:
  normal: {foreground: "@pal_text@"}
  directory: {foreground: "@pal_mauve@"}
  symlink: {foreground: "@pal_blue@"}
  pipe: {foreground: "@pal_subtext1@"}
  block_device: {foreground: "@pal_maroon@"}
  char_device: {foreground: "@pal_maroon@"}
  socket: {foreground: "@pal_subtext1@"}
  special: {foreground: "@pal_mauve@"}
  executable: {foreground: "@pal_green@"}
  mount_point: {foreground: "@pal_teal@"}

perms:
  user_read: {foreground: "@pal_red@", is_bold: true}
  user_write: {foreground: "@pal_yellow@", is_bold: true}
  user_execute_file: {foreground: "@pal_green@", is_bold: true}
  user_execute_other: {foreground: "@pal_green@", is_bold: true}
  group_read: {foreground: "@pal_red@"}
  group_write: {foreground: "@pal_yellow@"}
  group_execute: {foreground: "@pal_green@"}
  other_read: {foreground: "@pal_red@"}
  other_write: {foreground: "@pal_yellow@"}
  other_execute: {foreground: "@pal_green@"}
  special_user_file: {foreground: "@pal_mauve@"}
  special_other: {foreground: "@pal_overlay1@"}
  attribute: {foreground: "@pal_overlay2@"}

size:
  major: {foreground: "@pal_subtext0@"}
  minor: {foreground: "@pal_sky@"}
  number_byte: {foreground: "@pal_subtext1@"}
  number_kilo: {foreground: "@pal_subtext0@"}
  number_mega: {foreground: "@pal_blue@"}
  number_giga: {foreground: "@pal_mauve@"}
  number_huge: {foreground: "@pal_mauve@"}
  unit_byte: {foreground: "@pal_subtext0@"}
  unit_kilo: {foreground: "@pal_sky@"}
  unit_mega: {foreground: "@pal_mauve@"}
  unit_giga: {foreground: "@pal_mauve@"}
  unit_huge: {foreground: "@pal_teal@"}

users:
  user_you: {foreground: "@pal_text@"}
  user_root: {foreground: "@pal_red@"}
  user_other: {foreground: "@pal_maroon@"}
  group_yours: {foreground: "@pal_subtext0@"}
  group_other: {foreground: "@pal_overlay2@"}
  group_root: {foreground: "@pal_red@"}

links:
  normal: {foreground: "@pal_blue@"}
  multi_link_file: {foreground: "@pal_blue@"}

git:
  new: {foreground: "@pal_green@"}
  modified: {foreground: "@pal_yellow@"}
  deleted: {foreground: "@pal_maroon@"}
  renamed: {foreground: "@pal_teal@"}
  typechange: {foreground: "@pal_pink@"}
  ignored: {foreground: "@pal_overlay1@"}
  conflicted: {foreground: "@pal_peach@"}

git_repo:
  branch_main: {foreground: "@pal_subtext0@"}
  branch_other: {foreground: "@pal_mauve@"}
  git_clean: {foreground: "@pal_green@"}
  git_dirty: {foreground: "@pal_maroon@"}

security_context:
  colon: {foreground: "@pal_overlay0@"}
  user: {foreground: "@pal_overlay1@"}
  role: {foreground: "@pal_mauve@"}
  typ: {foreground: "@pal_surface2@"}
  range: {foreground: "@pal_mauve@"}

file_type:
  image: {foreground: "@pal_yellow@"}
  video: {foreground: "@pal_red@"}
  music: {foreground: "@pal_green@"}
  lossless: {foreground: "@pal_teal@"}
  crypto: {foreground: "@pal_overlay1@"}
  document: {foreground: "@pal_text@"}
  compressed: {foreground: "@pal_pink@"}
  temp: {foreground: "@pal_maroon@"}
  compiled: {foreground: "@pal_sapphire@"}
  source: {foreground: "@pal_blue@"}

punctuation: {foreground: "@pal_overlay0@"}
date: {foreground: "@pal_yellow@"}
inode: {foreground: "@pal_subtext0@"}
blocks: {foreground: "@pal_overlay0@"}
header: {foreground: "@pal_text@"}
octal: {foreground: "@pal_teal@"}
flags: {foreground: "@pal_mauve@"}

symlink_path: {foreground: "@pal_sky@"}
control_char: {foreground: "@pal_sapphire@"}
broken_symlink: {foreground: "@pal_red@"}
broken_path_overlay: {foreground: "@pal_surface2@"}
